<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cc"><circle cx="340" cy="340" r="300"/></clipPath>
    <linearGradient id="pkLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F6E56"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
    <linearGradient id="pdLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3C3489"/>
      <stop offset="100%" stop-color="#7F77DD"/>
    </linearGradient>
    <linearGradient id="bgFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3EE"/>
      <stop offset="100%" stop-color="#E8E5DC"/>
    </linearGradient>
    <linearGradient id="aucFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <circle cx="340" cy="340" r="300" fill="url(#bgFill)"/>
  <circle cx="340" cy="340" r="300" fill="none" stroke="#0F6E56" stroke-width="3.5"/>
  <circle cx="340" cy="340" r="294" fill="none" stroke="#1D9E75" stroke-width="0.8" opacity="0.5"/>
  <circle cx="340" cy="340" r="268" fill="none" stroke="#0F6E56" stroke-width="1" opacity="0.2"/>

  <!-- Grid -->
  <g clip-path="url(#cc)" opacity="0.15">
    <line x1="40"  y1="170" x2="640" y2="170" stroke="#0F6E56" stroke-width="0.8"/>
    <line x1="40"  y1="250" x2="640" y2="250" stroke="#0F6E56" stroke-width="0.8"/>
    <line x1="40"  y1="330" x2="640" y2="330" stroke="#0F6E56" stroke-width="0.8"/>
    <line x1="40"  y1="410" x2="640" y2="410" stroke="#0F6E56" stroke-width="0.8"/>
    <line x1="40"  y1="490" x2="640" y2="490" stroke="#0F6E56" stroke-width="0.8"/>
    <line x1="170" y1="40"  x2="170" y2="640" stroke="#0F6E56" stroke-width="0.8"/>
    <line x1="250" y1="40"  x2="250" y2="640" stroke="#0F6E56" stroke-width="0.8"/>
    <line x1="340" y1="40"  x2="340" y2="640" stroke="#0F6E56" stroke-width="0.8"/>
    <line x1="430" y1="40"  x2="430" y2="640" stroke="#0F6E56" stroke-width="0.8"/>
    <line x1="510" y1="40"  x2="510" y2="640" stroke="#0F6E56" stroke-width="0.8"/>
  </g>

  <g clip-path="url(#cc)">

    <!-- OPEN in black -->
    <text x="340" y="108" text-anchor="middle"
          font-family="Arial Narrow, Arial, sans-serif"
          font-size="24" font-weight="700" letter-spacing="14" fill="#1a1a1a">OPEN</text>

    <!-- PK -->
    <text font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900">
      <tspan x="234" y="188" fill="#0F6E56" letter-spacing="-4">P</tspan><tspan fill="#0F6E56" letter-spacing="0">K</tspan>
    </text>
    <!-- PD -->
    <text font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900">
      <tspan x="352" y="188" fill="#3C3489" letter-spacing="-4">P</tspan><tspan fill="#3C3489" letter-spacing="0">D</tspan>
    </text>

    <!-- Divider rule -->
    <line x1="100" y1="204" x2="580" y2="204" stroke="#0F6E56" stroke-width="1" opacity="0.4"/>

    <!-- Axes -->
    <line x1="120" y1="500" x2="590" y2="500" stroke="#2C2C2A" stroke-width="1.5" opacity="0.5"/>
    <line x1="138" y1="222" x2="138" y2="502" stroke="#2C2C2A" stroke-width="1.5" opacity="0.5"/>

    <!-- AUC fill -->
    <path d="M 138 500 C 150 500 165 310 200 295 C 235 280 258 302 292 340 C 326 378 350 422 384 452 C 418 480 444 492 484 496 L 484 500 Z" fill="url(#aucFill)"/>

    <!-- PK curve -->
    <path d="M 138 500 C 150 500 165 310 200 295 C 235 280 258 302 292 340 C 326 378 350 422 384 452 C 418 480 444 492 484 496"
          fill="none" stroke="url(#pkLine)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- PD sigmoid -->
    <path d="M 138 488 C 146 488 160 479 176 464 C 194 446 210 416 230 384 C 252 348 272 314 300 288 C 330 261 362 252 400 249 C 432 246 462 245 500 244"
          fill="none" stroke="url(#pdLine)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Cmax dashed -->
    <line x1="200" y1="295" x2="200" y2="500" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.5"/>
    <!-- EC50 dashed -->
    <line x1="138" y1="384" x2="230" y2="384" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.5"/>

    <!-- Cmax dot -->
    <circle cx="200" cy="295" r="7"  fill="#0F6E56"/>
    <circle cx="200" cy="295" r="13" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.4"/>
    <!-- EC50 dot -->
    <circle cx="230" cy="384" r="6"  fill="#3C3489"/>
    <circle cx="230" cy="384" r="11" fill="none" stroke="#534AB7" stroke-width="1.5" opacity="0.4"/>

    <!-- Axis ticks -->
    <line x1="133" y1="295" x2="143" y2="295" stroke="#2C2C2A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="200" y1="495" x2="200" y2="505" stroke="#2C2C2A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Leader from curve to molecule -->
    <line x1="430" y1="452" x2="430" y2="400" stroke="#0F6E56" stroke-width="1" stroke-dasharray="3 3" opacity="0.35"/>
    <circle cx="430" cy="452" r="3" fill="#0F6E56" opacity="0.5"/>

    <!-- MOLECULE — Ring A centre (390,352), Ring B centre (430,352) -->
    <!-- Ring A -->
    <line x1="390" y1="330" x2="409" y2="341" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="409" y1="341" x2="409" y2="363" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="409" y1="363" x2="390" y2="374" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="390" y1="374" x2="371" y2="363" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="371" y1="363" x2="371" y2="341" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="371" y1="341" x2="390" y2="330" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="390" y1="334" x2="405" y2="343" stroke="#085041" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
    <line x1="405" y1="361" x2="390" y2="370" stroke="#085041" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
    <line x1="375" y1="343" x2="375" y2="361" stroke="#085041" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
    <!-- Ring B -->
    <line x1="409" y1="341" x2="430" y2="330" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="430" y1="330" x2="449" y2="341" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="449" y1="341" x2="449" y2="363" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="449" y1="363" x2="430" y2="374" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="430" y1="374" x2="409" y2="363" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="430" y1="334" x2="445" y2="343" stroke="#085041" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
    <line x1="445" y1="361" x2="430" y2="370" stroke="#085041" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
    <line x1="413" y1="343" x2="413" y2="361" stroke="#085041" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
    <!-- Carboxylic acid: Btr(449,341) -> C*(462,326) -> O1(450,312) + O2(476,316) -->
    <line x1="449" y1="341" x2="462" y2="326" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="462" y1="326" x2="450" y2="312" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="465" y1="324" x2="453" y2="310" stroke="#085041" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <circle cx="450" cy="312" r="6" fill="#FAECE7" stroke="#993C1D" stroke-width="2"/>
    <text x="450" y="312" font-family="Arial, sans-serif" font-weight="700" font-size="7" fill="#993C1D" text-anchor="middle" dominant-baseline="central">O</text>
    <line x1="462" y1="326" x2="476" y2="316" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="476" cy="316" r="6" fill="#FAECE7" stroke="#993C1D" stroke-width="2"/>
    <text x="476" y="316" font-family="Arial, sans-serif" font-weight="700" font-size="7" fill="#993C1D" text-anchor="middle" dominant-baseline="central">O</text>
    <!-- Amine: At(390,330) -> N(390,309) -> CH3x2 -->
    <line x1="390" y1="330" x2="390" y2="316" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="390" cy="309" r="7" fill="#EEEDFE" stroke="#3C3489" stroke-width="2"/>
    <text x="390" y="309" font-family="Arial, sans-serif" font-weight="700" font-size="7" fill="#3C3489" text-anchor="middle" dominant-baseline="central">N</text>
    <line x1="390" y1="302" x2="377" y2="290" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="390" y1="302" x2="403" y2="290" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="377" cy="290" r="4" fill="#E1F5EE" stroke="#085041" stroke-width="1.8"/>
    <circle cx="403" cy="290" r="4" fill="#E1F5EE" stroke="#085041" stroke-width="1.8"/>
    <!-- Fluorine: Bbr(449,363) -> F(465,374) -->
    <line x1="449" y1="363" x2="465" y2="374" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="465" cy="374" r="7" fill="#E1F5EE" stroke="#085041" stroke-width="2"/>
    <text x="465" y="374" font-family="Arial, sans-serif" font-weight="700" font-size="7.5" fill="#085041" text-anchor="middle" dominant-baseline="central">F</text>
    <!-- Alkyl: Abl(371,363) -> C1(355,374) -> C2(340,363) + C3(355,390) -->
    <line x1="371" y1="363" x2="355" y2="374" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="355" cy="374" r="4" fill="#E1F5EE" stroke="#085041" stroke-width="1.8"/>
    <line x1="355" y1="374" x2="340" y2="363" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="340" cy="363" r="4" fill="#E1F5EE" stroke="#085041" stroke-width="1.8"/>
    <line x1="355" y1="374" x2="355" y2="390" stroke="#085041" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="355" cy="390" r="4" fill="#E1F5EE" stroke="#085041" stroke-width="1.8"/>

    <!-- Rule above tagline -->
    <line x1="130" y1="524" x2="550" y2="524" stroke="#0F6E56" stroke-width="0.8" opacity="0.35"/>

    <!-- Tagline: amber / near-black / burgundy -->
    <text x="208" y="552" text-anchor="middle"
          font-family="Courier New, monospace"
          font-size="16" font-weight="700" letter-spacing="2" fill="#854F0B">MODELING</text>
    <circle cx="269" cy="546" r="2.5" fill="#888780"/>
    <text x="340" y="552" text-anchor="middle"
          font-family="Courier New, monospace"
          font-size="16" font-weight="700" letter-spacing="2" fill="#2C2C2A">SIMULATION</text>
    <circle cx="411" cy="546" r="2.5" fill="#888780"/>
    <text x="472" y="552" text-anchor="middle"
          font-family="Courier New, monospace"
          font-size="16" font-weight="700" letter-spacing="2" fill="#72243E">ANALYSIS</text>

  </g>
</svg>
