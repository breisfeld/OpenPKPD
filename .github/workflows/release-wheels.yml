name: Release wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-x86_64:
    name: manylinux_2_28 · x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: >-
            --manifest-path rust/Cargo.toml
            --release
            --features native-cvodes
            --out dist
            --find-interpreter
          manylinux: manylinux_2_28
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          before-script-linux: |
            /opt/python/cp312-cp312/bin/pip install -q libclang
            export PATH="/opt/python/cp312-cp312/bin:$PATH"
            LIBCLANG_SO=$(find /opt/python/cp312-cp312 /opt/_internal -name 'libclang.so' 2>/dev/null | head -1)
            [[ -n "$LIBCLANG_SO" ]] && export LIBCLANG_PATH=$(dirname "$LIBCLANG_SO")
            GCC_INCDIR=$(/opt/rh/devtoolset-10/root/usr/bin/gcc -print-file-name=include 2>/dev/null || gcc -print-file-name=include 2>/dev/null || echo "")
            [[ -n "$GCC_INCDIR" && "$GCC_INCDIR" != "include" ]] && export BINDGEN_EXTRA_CLANG_ARGS="-I${GCC_INCDIR} -I/usr/include"
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-x86_64
          path: dist

  macos-intel:
    name: macOS Intel · x86_64
    runs-on: macos-15-intel
    env:
      MACOSX_DEPLOYMENT_TARGET: '10.13'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: >-
            --manifest-path rust/Cargo.toml
            --release
            --features native-cvodes
            --out dist
            --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-intel
          path: dist

  macos-arm64:
    name: macOS Apple Silicon · aarch64
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: >-
            --manifest-path rust/Cargo.toml
            --release
            --features native-cvodes
            --out dist
            --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-arm64
          path: dist

  windows-x64:
    name: Windows · x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.12
            3.13
          architecture: x64
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: >-
            --manifest-path rust/Cargo.toml
            --release
            --features native-cvodes
            --out dist
            --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-x64
          path: dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path rust/Cargo.toml --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux-x86_64, macos-intel, macos-arm64, windows-x64, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v7
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
