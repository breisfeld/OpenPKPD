# ---------------------------------------------------------------------------
# GitLab CI/CD — OpenPKPD
# Python 3.12 · uv · ruff · mypy · pytest · Sphinx · PyInstaller
# ---------------------------------------------------------------------------

workflow:
  rules:
  - when: never

default:
  image: python:3.12-slim
  before_script:
  - pip install --quiet uv
  - uv sync --extra dev --extra full --extra docs
  cache:
    key: uv-$CI_COMMIT_REF_SLUG
    paths:
    - .uv-cache/

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  # Prevent uv from querying the keyring, which may not be available in CI.
  UV_KEYRING_PROVIDER: "disabled"

stages:
- lint
- typecheck
- test
- build
- package
- publish
- docs

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------

ruff:check:
  stage: lint
  script:
  - uv run ruff check src/ tests/
  allow_failure: false

ruff:format:
  stage: lint
  script:
  - uv run ruff format --check src/ tests/
  # Format violations are informational — they do not block the pipeline.
  allow_failure: true

# ---------------------------------------------------------------------------
# Type checking
# ---------------------------------------------------------------------------

mypy:
  stage: typecheck
  script:
  - uv run mypy src/openpkpd
  # Type errors are surfaced but do not fail the pipeline while the project
  # is still reaching full annotation coverage.
  allow_failure: true

# ---------------------------------------------------------------------------
# Tests
# ---------------------------------------------------------------------------

test:unit:
  stage: test
  script:
  - uv run python scripts/prewarm_symbolic_caches.py
  - >
    uv run pytest tests/unit/ -m unit -v --tb=short --junitxml=reports/junit-unit.xml --cov=openpkpd --cov-report=xml:reports/coverage.xml --cov-report=term-missing
  coverage: '/(?i)total.*?\s+(\d+(?:\.\d+)?)%/'
  artifacts:
    when: always
    reports:
      junit: reports/junit-unit.xml
      coverage_report:
        coverage_format: cobertura
        path: reports/coverage.xml
    paths:
    - reports/
    expire_in: 1 week

test:integration:
  stage: test
  rules:
  # Always run on the main branch.
  - if: $CI_COMMIT_BRANCH == "main"
  # Allow manual triggering on any other branch.
  - when: manual
    allow_failure: true
  script:
  - >
    uv run pytest tests/integration/ -m integration -v --tb=short --junitxml=reports/junit-integration.xml
  artifacts:
    when: always
    reports:
      junit: reports/junit-integration.xml
    paths:
    - reports/
    expire_in: 1 week

# ---------------------------------------------------------------------------
# Build — Rust extension wheels (per-platform) + source distribution
#
# Linux:   runs inside ghcr.io/pyo3/maturin (manylinux_2_28 container).
# macOS:   runs on self-hosted runners; Rust toolchain must be pre-installed.
# Windows: runs on self-hosted runner; Rust toolchain must be pre-installed.
#
# All wheel jobs trigger on version tags and can be run manually on any branch.
# The pure-Python fallback (no _core) is covered by test:unit which runs
# without building the Rust extension.
# ---------------------------------------------------------------------------

.wheel_rules: &wheel_rules
  rules:
  - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+/
  - when: manual
    allow_failure: true

build:wheel:linux:
  stage: build
  image: ghcr.io/pyo3/maturin
  before_script: []   # override default — maturin image needs no uv bootstrap
  <<: *wheel_rules
  script:
  # manylinux_2_28 wheel — compatible with most modern Linux distributions
  - maturin build --release --compatibility manylinux_2_28 --out dist/
  tags:
  - linux-x86_64
  artifacts:
    paths:
    - dist/*.whl
    expire_in: 4 weeks

build:wheel:macos-arm64:
  stage: build
  image: null
  before_script:
  - pip3 install --quiet "maturin>=1.5,<2"
  <<: *wheel_rules
  script:
  - maturin build --release --out dist/
  tags:
  - macos-arm64
  artifacts:
    paths:
    - dist/*.whl
    expire_in: 4 weeks

build:wheel:macos-x86:
  stage: build
  image: null
  before_script:
  - pip install --quiet "maturin>=1.5,<2"
  <<: *wheel_rules
  script:
  - maturin build --release --out dist/
  tags:
  - macos-x86_64
  artifacts:
    paths:
    - dist/*.whl
    expire_in: 4 weeks

build:wheel:windows:
  stage: build
  image: null
  before_script:
  - pip install --quiet "maturin>=1.5,<2"
  <<: *wheel_rules
  script:
  - maturin build --release --out dist/
  tags:
  - windows-x64
  artifacts:
    paths:
    - dist/*.whl
    expire_in: 4 weeks

build:sdist:
  stage: build
  before_script:
  - pip install --quiet uv "maturin>=1.5,<2"
  <<: *wheel_rules
  script:
  - maturin sdist --out dist/
  artifacts:
    paths:
    - dist/*.tar.gz
    expire_in: 4 weeks

# ---------------------------------------------------------------------------
# Publish — upload wheels + sdist to PyPI
#
# Requires CI variable PYPI_API_TOKEN set in GitLab project settings.
# Only runs on version tags after all wheel builds succeed.
# ---------------------------------------------------------------------------

publish:pypi:
  stage: publish
  image: python:3.12-slim
  before_script: []
  rules:
  - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+/
  needs:
  - build:wheel:linux
  - build:wheel:macos-arm64
  - build:wheel:macos-x86
  - build:wheel:windows
  - build:sdist
  script:
  - pip install --quiet twine
  - twine upload --non-interactive dist/*
  variables:
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: $PYPI_API_TOKEN

# ---------------------------------------------------------------------------
# Package — platform installers
#
# These jobs run on self-hosted runners tagged by platform.
# They are triggered automatically on version tags (v*) and can be run
# manually on any branch.
#
# Required runner tags:
#   linux-x86_64  — Linux shell runner, Python 3.12, Qt display via Xvfb
#   macos-arm64   — macOS shell runner, Python 3.12, Xcode CLI tools
#   windows-x64   — Windows shell runner, Python 3.12, optional NSIS
# ---------------------------------------------------------------------------

.package_common:
  stage: package
  # Inherit no default image — platform runners use their native shell.
  image: null
  rules:
  # Always run on version tags.
  - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+/
  # Allow manual triggering on any branch.
  - when: manual
    allow_failure: true
  variables:
    UV_KEYRING_PROVIDER: "disabled"
  before_script: [] # override default (no Docker image here)
  after_script:
  - echo "Installer artifact built successfully"

package:linux:
  extends: .package_common
  tags:
  - linux-x86_64
  before_script:
  - pip install --quiet uv
  - uv sync --extra gui --extra packaging
  # Install appimagetool so the build script produces an AppImage in addition
  # to the tarball.  FUSE is not available in most CI containers, so we use
  # --appimage-extract-and-run which runs appimagetool without mounting.
  - |
    curl -fsSL https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage \
      -o /usr/local/bin/appimagetool
    chmod +x /usr/local/bin/appimagetool
  - apt-get install -y --no-install-recommends libfuse2 || true
  variables:
    APPIMAGE_EXTRACT_AND_RUN: "1" # run appimagetool without FUSE
  script:
  - >
    uv run python scripts/build_installer.py --version "${CI_COMMIT_TAG#v}" --output-dir dist/linux
  artifacts:
    name: "openpkpd-linux-${CI_COMMIT_TAG}"
    paths:
    - dist/linux/
    expire_in: 4 weeks

package:macos:
  extends: .package_common
  tags:
  - macos-arm64
  before_script:
  - pip3 install --quiet uv
  - uv sync --extra gui --extra packaging
  script:
  - >
    uv run python scripts/build_installer.py --version "${CI_COMMIT_TAG#v}" --output-dir dist/macos
  after_script:
  # Optional: notarise the DMG when credentials are configured.
  - |
    if [ -n "$MACOS_NOTARIZE_APPLE_ID" ]; then
      DMG=$(ls dist/macos/*.dmg | head -1)
      xcrun notarytool submit "$DMG" \
        --apple-id "$MACOS_NOTARIZE_APPLE_ID" \
        --password  "$MACOS_NOTARIZE_APP_PASSWORD" \
        --team-id   "$MACOS_NOTARIZE_TEAM_ID" \
        --wait
      xcrun stapler staple "$DMG"
    fi
  artifacts:
    name: "openpkpd-macos-${CI_COMMIT_TAG}"
    paths:
    - dist/macos/
    expire_in: 4 weeks

package:windows:
  extends: .package_common
  tags:
  - windows-x64
  before_script:
  - pip install --quiet uv
  - uv sync --extra gui --extra packaging
  - choco install nsis --yes --no-progress
  script:
  # Strip the leading 'v' from the tag on PowerShell
  - $VERSION = $env:CI_COMMIT_TAG -replace '^v', ''
  - uv run python scripts/build_installer.py --version $VERSION --output-dir dist/windows
  artifacts:
    name: "openpkpd-windows-${CI_COMMIT_TAG}"
    paths:
    - dist/windows/
    expire_in: 4 weeks

# ---------------------------------------------------------------------------
# Documentation
# ---------------------------------------------------------------------------

docs:sphinx:
  stage: docs
  rules:
  - if: $CI_COMMIT_BRANCH == "main"
  script:
  - cd docs && uv run make html
  artifacts:
    paths:
    - docs/_build/html/
    expire_in: 1 week
