name: Build wheels

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-x86_64:
    name: manylinux_2_28 · x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: >-
            --manifest-path rust/Cargo.toml
            --release
            --features native-cvodes
            --out dist
            --interpreter python3.12 python3.13
          manylinux: manylinux_2_28
          sccache: 'true'
          before-script-linux: |
            # cmake<4 is still required: sundials-sys 0.2.5 vendors SUNDIALS 5.7.0 whose
            # SundialsPOSIXTimers.cmake generates a temporary CMakeLists.txt that
            # hardcodes CMAKE_MINIMUM_REQUIRED(VERSION 3.0.2), which cmake 4 rejects.
            # This code path is Linux-only (requires librt), so macOS/Windows are unaffected.
            /opt/python/cp312-cp312/bin/pip install -q "cmake<4" libclang
            export PATH="/opt/python/cp312-cp312/bin:$PATH"
            LIBCLANG_SO=$(find /opt/python/cp312-cp312 /opt/_internal -name 'libclang.so' 2>/dev/null | head -1)
            [[ -n "$LIBCLANG_SO" ]] && export LIBCLANG_PATH=$(dirname "$LIBCLANG_SO")
            GCC_INCDIR=$(/opt/rh/devtoolset-10/root/usr/bin/gcc -print-file-name=include 2>/dev/null || gcc -print-file-name=include 2>/dev/null || echo "")
            [[ -n "$GCC_INCDIR" && "$GCC_INCDIR" != "include" ]] && export BINDGEN_EXTRA_CLANG_ARGS="-I${GCC_INCDIR} -I/usr/include"
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-x86_64
          path: dist

  macos-intel:
    name: macOS Intel · x86_64
    runs-on: macos-15-intel
    env:
      MACOSX_DEPLOYMENT_TARGET: '10.13'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: >-
            --manifest-path rust/Cargo.toml
            --release
            --features native-cvodes
            --out dist
            --interpreter python3.12 python3.13
          sccache: 'true'
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-intel
          path: dist

  macos-arm64:
    name: macOS Apple Silicon · aarch64
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: >-
            --manifest-path rust/Cargo.toml
            --release
            --features native-cvodes
            --out dist
            --interpreter python3.12 python3.13
          sccache: 'true'
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-arm64
          path: dist

  windows-x64:
    name: Windows · x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.12
            3.13
          architecture: x64
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: >-
            --manifest-path rust/Cargo.toml
            --release
            --features native-cvodes
            --out dist
            --interpreter python3.12 python3.13
          sccache: 'true'
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-x64
          path: dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path rust/Cargo.toml --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist
